apiVersion: batch/v1
kind: Job
metadata:
  name: test-replay-100eps
  labels:
    app.kubernetes.io/managed-by: quick-smoke-test
    test-type: "100eps"
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: quick-smoke-test
        test-type: "100eps"
    spec:
      serviceAccountName: vacciguard-pipeline
      restartPolicy: Never
      containers:
        - name: replay-producer
          image: 347038623570.dkr.ecr.ap-south-1.amazonaws.com/vacciguard-aayush-baseline-replay-producer:bootstrap-20260413
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.vacciguard.svc.cluster.local:9092"
            - name: KAFKA_TOPIC
              value: "vacciguard-telemetry"
            - name: EVENTS_PER_SECOND
              value: "100"
            - name: WORKLOAD_FILE
              value: "/data/events.ndjson"
            - name: TOTAL_EVENTS
              value: "5000"
          volumeMounts:
            - name: workload
              mountPath: /data
              readOnly: true
      volumes:
        - name: workload
          configMap:
            name: test-workload-100eps
