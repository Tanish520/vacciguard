apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-baseline-overview
  namespace: monitoring
data:
  baseline-overview.json: |
    {
      "title": "VacciGuard Baseline Overview",
      "uid": "vacciguard-baseline-overview",
      "schemaVersion": 39,
      "version": 2,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Replay Sent Events",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "sum(vacciguard_replay_sent_events_total)",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Replay Completion Status",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "vacciguard_replay_completion_status and on(pod) topk(1, vacciguard_replay_run_started_timestamp_seconds)",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Stream Processed Events",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "sum(vacciguard_stream_processed_events_total)",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Stream Invalid Events",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "sum(vacciguard_stream_invalid_events_total)",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "Stream Deduplicated Events",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 4 },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "sum(vacciguard_stream_deduplicated_events_total)",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "Stream Breach Events",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 4 },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "sum(vacciguard_stream_breach_events_total)",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "Latest Batch Avg Latency",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 4 },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "avg(vacciguard_stream_latest_batch_avg_latency_seconds)",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "Latest Batch P95 Latency",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 4 },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "avg(vacciguard_stream_latest_batch_p95_latency_seconds)",
              "refId": "A"
            }
          ]
        }
      ]
    }
