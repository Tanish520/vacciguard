apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: adot-collector
# IRSA subject: system:serviceaccount:observability:adot-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: adot-collector
subjects:
  - kind: ServiceAccount
    name: adot-collector
    namespace: observability
