apiVersion: apps/v1
kind: Deployment
metadata:
  name: adot-collector
  namespace: observability
  labels:
    app: adot-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adot-collector
  template:
    metadata:
      labels:
        app: adot-collector
    spec:
      serviceAccountName: adot-collector
      containers:
        - name: collector
          image: public.ecr.aws/aws-observability/aws-otel-collector:latest
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/otel/config.yaml
          envFrom:
            - configMapRef:
                name: adot-collector-config
          ports:
            - name: health
              containerPort: 13133
            - name: metrics
              containerPort: 8888
          volumeMounts:
            - name: collector-config
              mountPath: /etc/otel/config.yaml
              subPath: config.yaml
      volumes:
        - name: collector-config
          configMap:
            name: adot-collector-config
