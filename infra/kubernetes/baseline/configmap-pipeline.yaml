apiVersion: v1
kind: ConfigMap
metadata:
  name: vacciguard-pipeline-config
# Live baseline values for the current AWS environment.
# Refresh these entries if the environment changes.
data:
  APP_NAME: vacciguard-stream-processor
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  KAFKA_TOPIC: vacciguard-telemetry
  KAFKA_STARTING_OFFSETS: earliest
  PROCESSED_OUTPUT_PATH: s3a://vacciguard-tanish-baseline-ap-south-1-data/processed
  INVALID_OUTPUT_PATH: s3a://vacciguard-tanish-baseline-ap-south-1-data/invalid
  CHECKPOINT_ROOT: s3a://vacciguard-tanish-baseline-ap-south-1-data/checkpoints
  BREACH_WINDOW_OUTPUT_PATH: s3a://vacciguard-tanish-baseline-ap-south-1-data/breach_windows
  REDIS_HOST: 172.31.23.223
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  KAFKA_TOPIC_PARTITIONS: "8"
  SPARK_SQL_SHUFFLE_PARTITIONS: "8"
  SPARK_DEFAULT_PARALLELISM: "8"
  MAX_OFFSETS_PER_TRIGGER: "400"
  TRIGGER_INTERVAL: 2 seconds
  WATERMARK_DELAY: 10 minutes
  PIPELINE_MODE: baseline
