apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-processor
  namespace: vacciguard
spec:
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        pipeline_target: baseline
    spec:
      containers:
        - name: stream-processor
          resources:
            requests:
              cpu: "1500m"
              memory: "2560Mi"
            limits:
              cpu: "2000m"
              memory: "4096Mi"
