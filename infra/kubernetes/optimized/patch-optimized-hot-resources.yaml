apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-processor-hot
  namespace: vacciguard
spec:
  template:
    spec:
      containers:
        - name: stream-processor
          resources:
            requests:
              cpu: "1100m"
              memory: "2560Mi"
            limits:
              cpu: "2000m"
              memory: "4096Mi"
