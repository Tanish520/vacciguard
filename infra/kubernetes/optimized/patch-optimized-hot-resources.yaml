apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-processor-hot
  namespace: vacciguard
spec:
  template:
    spec:
      containers:
        - name: stream-processor
          resources:
            requests:
              cpu: "1750m"
              memory: "3072Mi"
            limits:
              cpu: "2500m"
              memory: "4096Mi"
